name: Build and Push Development Helm Chart
# Publishes a prerelease Helm chart to GHCR when the chart itself changes, so
# chart changes can be tested before a release. Does NOT run on ordinary code
# merges (the dev image is handled by build-dev.yml). Release charts are handled
# by release.yml.

on:
  push:
    branches: [ main, 'migration/*' ]
    paths:
      - 'deployments/helm/**'
      - '.github/workflows/build-dev-chart.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  publish-dev-chart:
    name: Package & Push Dev Helm Chart
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.16.2

      - name: Convert repository owner to lowercase
        id: repo_owner
        run: echo "owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR (Helm)
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ${{ env.REGISTRY }} --username ${{ github.actor }} --password-stdin

      - name: Package chart
        # Chart version must be valid SemVer: 0.0.0-dev.<run> sorts below any
        # real release, so `helm install` skips it unless --devel is passed.
        # appVersion is left as-is from Chart.yaml (metadata only). image.tag is
        # required and has no default, so installers must set it to the dev image
        # they want to test, e.g. --set image.tag=dev-<run>-<sha>.
        run: |
          helm package deployments/helm/nsw-agency \
            --version "0.0.0-dev.${{ github.run_number }}" \
            --destination .

      - name: Push chart to GHCR
        run: |
          helm push nsw-agency-0.0.0-dev.${{ github.run_number }}.tgz \
            oci://${{ env.REGISTRY }}/${{ steps.repo_owner.outputs.owner }}/charts

      - name: Summary
        run: |
          {
            echo "## Dev Helm Chart Published"
            echo ""
            echo "- Chart: \`oci://${{ env.REGISTRY }}/${{ steps.repo_owner.outputs.owner }}/charts/nsw-agency\`"
            echo "- Version: 0.0.0-dev.${{ github.run_number }} (prerelease — install with --devel or --version)"
            echo "- image.tag is required at install, e.g. --set image.tag=dev-<run>-<sha>"
          } >> "$GITHUB_STEP_SUMMARY"
