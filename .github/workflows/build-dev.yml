name: Build and Push Development Image

on:
  push:
    branches: [ main, 'migration/*' ]
    # Only rebuild the dev image when something that affects the image build
    # context changes. Docs/CI-only changes don't produce a new image.
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'Dockerfile'
      - '.github/workflows/build-dev.yml'
  workflow_dispatch:

# Cancel in-progress runs for the same branch when a new commit arrives.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: agency

jobs:
  build:
    name: Build & Push Dev - NSW Agency
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Application Repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Convert repository owner to lowercase
        id: repo_owner
        run: echo "owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.repo_owner.outputs.owner }}/${{ env.IMAGE_NAME }}:dev-${{ github.run_number }}-${{ github.sha }}
          build-args: |
            BUILD_VERSION=dev-${{ github.run_number }}-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
