name: Docker Validation CI
# Validates that the consolidated Docker image builds successfully on PRs to main.
# The whole app is one image (root Dockerfile): the Go server serves the API and
# the officer-portal SPA from one process. This workflow never pushes — it is
# purely a build-correctness check. Image publishing is handled by release.yml.

on:
  pull_request:
    branches: [main, 'migration/*']
    # Run only when files that affect the image build context change,
    # or when this workflow file itself changes.
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'Dockerfile'
      - '.github/workflows/docker-validation.yml'

# Cancel in-progress runs for the same branch/PR when a new commit arrives.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docker-validate:
    name: Validate agency image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # BuildKit is required for cache-from/cache-to and multi-stage build optimisations.
      - uses: docker/setup-buildx-action@v3

      - name: Build agency image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false  # validation only — never push in this workflow
          tags: agency:validate
          # GHA cache backend reuses layers across runs.
          cache-from: type=gha
          cache-to: type=gha,mode=max
