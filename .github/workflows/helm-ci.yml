name: Helm Chart CI
# Validates the Helm chart on PRs: lint + render. Never publishes — packaging and
# pushing to GHCR is handled by build-dev.yml (dev) and release.yml (release).

on:
  pull_request:
    branches: [main, 'migration/*']
    paths:
      - 'deployments/helm/**'
      - '.github/workflows/helm-ci.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  helm-validate:
    name: Lint & template chart
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.16.2

      - name: Lint chart
        run: helm lint deployments/helm/nsw-agency -f deployments/helm/values-example.yaml

      - name: Render templates (default values + explicit tag)
        # image.tag is required and has no default, so supply one here.
        run: helm template nsw-agency deployments/helm/nsw-agency --set image.tag=ci

      - name: Render templates (example values)
        run: helm template nsw-agency deployments/helm/nsw-agency -f deployments/helm/values-example.yaml

      - name: Assert image.tag is required
        # Rendering with no tag MUST fail — guards against re-introducing a default.
        run: |
          if helm template nsw-agency deployments/helm/nsw-agency >/dev/null 2>&1; then
            echo "::error::chart rendered without image.tag — the required guard is missing"
            exit 1
          fi
          echo "OK: chart correctly refuses to render without image.tag"
