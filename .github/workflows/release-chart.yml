name: Release - Publish Helm Chart
# Publishes a released Helm chart to GHCR, on its OWN cadence — decoupled from
# app image releases (release.yml, tag v*.*.*). Cut a chart release with a
# chart-v* tag, e.g.:
#   git tag chart-v0.3.0 && git push origin chart-v0.3.0
#
# The chart VERSION comes from the tag. The chart's appVersion (which app image
# it deploys by default) comes from Chart.yaml — bump it in a PR when you want
# the chart's default to track a newer app release.

on:
  push:
    tags:
      - 'chart-v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Chart version to release (without leading v), e.g. 0.3.0'
        required: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  publish-chart:
    name: Package & Push Release Helm Chart
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.16.2

      - name: Convert repository owner to lowercase
        id: repo_owner
        run: echo "owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Determine chart version
        id: chart
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF#refs/tags/chart-v}"
          fi
          VERSION="${VERSION#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Lint chart
        run: helm lint deployments/helm/nsw-agency -f deployments/helm/values-example.yaml

      - name: Log in to GHCR (Helm)
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ${{ env.REGISTRY }} --username ${{ github.actor }} --password-stdin

      - name: Package chart
        # VERSION comes from the tag; appVersion is taken from Chart.yaml (no
        # --app-version override), so the maintainer controls which app image the
        # chart ships with by editing Chart.yaml.
        run: |
          helm package deployments/helm/nsw-agency \
            --version "${{ steps.chart.outputs.version }}" \
            --destination .

      - name: Push chart to GHCR
        run: |
          helm push nsw-agency-${{ steps.chart.outputs.version }}.tgz \
            oci://${{ env.REGISTRY }}/${{ steps.repo_owner.outputs.owner }}/charts

      - name: Summary
        run: |
          {
            echo "## Helm Chart Released"
            echo ""
            echo "- Chart: \`oci://${{ env.REGISTRY }}/${{ steps.repo_owner.outputs.owner }}/charts/nsw-agency\`"
            echo "- Version: ${{ steps.chart.outputs.version }} (appVersion taken from Chart.yaml)"
          } >> "$GITHUB_STEP_SUMMARY"
