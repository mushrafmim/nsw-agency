name: Release - Build and Publish Agency Image

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (without leading v)'
        required: true

env:
  REGISTRY: ghcr.io
  # The whole app ships as ONE image (root Dockerfile): the Go server serves the
  # API and the officer-portal SPA from one process.
  IMAGE_NAME: agency

jobs:
  build-and-publish:
    name: Build and Publish
    runs-on: ubuntu-latest
    permissions:
      packages: write
      security-events: write
      id-token: write
    env:
      GIT_COMMIT: ${{ github.sha }}
    outputs:
      release_enabled: ${{ steps.release-mode.outputs.enabled }}
      version: ${{ steps.version.outputs.tag }}
      is_prerelease: ${{ steps.version.outputs.is_prerelease }}
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set build time
        id: build-time
        run: |
          TIMESTAMP="${{ github.event.repository.pushed_at }}"
          if [ -z "$TIMESTAMP" ]; then
            TIMESTAMP=$(date -u +'%Y-%m-%dT%H:%M:%SZ')
          fi
          echo "build_time=${TIMESTAMP}" >> "$GITHUB_OUTPUT"

      - name: Determine release mode
        id: release-mode
        run: |
          if [[ "${{ github.event_name }}" == "push" && "${{ github.ref }}" == refs/tags/* ]] || \
             [[ "${{ github.event_name }}" == "workflow_dispatch" && -n "${{ github.event.inputs.version }}" ]]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: steps.release-mode.outputs.enabled == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF#refs/tags/}"
          fi
          VERSION="${VERSION#v}"
          echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"
          if [[ "${VERSION}" == *-* ]]; then
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Convert repository owner to lowercase
        id: repo_owner
        run: echo "owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ steps.repo_owner.outputs.owner }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}},enable=${{ github.event_name == 'push' }}
            type=semver,pattern={{major}}.{{minor}},enable=${{ github.event_name == 'push' }}
            type=semver,pattern={{major}},enable=${{ github.event_name == 'push' }}
            type=raw,value=${{ steps.version.outputs.tag }},enable=${{ github.event_name == 'workflow_dispatch' }}
            type=raw,value=latest,enable=${{ steps.release-mode.outputs.enabled == 'true' }}
            type=sha,format=long
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.description=NSW Agency service (backend API + officer portal)
            org.opencontainers.image.licenses=Apache-2.0
            org.opencontainers.image.version=${{ steps.version.outputs.tag }}
            org.opencontainers.image.revision=${{ env.GIT_COMMIT }}
            org.opencontainers.image.created=${{ steps.build-time.outputs.build_time }}

      - name: Build and publish image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: ${{ steps.release-mode.outputs.enabled == 'true' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BUILD_VERSION=${{ steps.version.outputs.tag }}
          provenance: mode=max
          sbom: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Resolve primary image ref
        id: image
        run: echo "ref=${{ fromJSON(steps.meta.outputs.json).tags[0] }}" >> "$GITHUB_OUTPUT"

      - name: Setup Trivy
        if: steps.release-mode.outputs.enabled == 'true'
        uses: aquasecurity/setup-trivy@e6c2c5e321ed9123bda567646e2f96565e34abe1
        with:
          version: v0.69.3
          cache: true

      - name: Run Trivy vulnerability scanner
        id: trivy-scan
        if: steps.release-mode.outputs.enabled == 'true'
        run: |
          trivy image \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --format sarif \
            --output "trivy-${{ env.IMAGE_NAME }}.sarif" \
            --exit-code 0 \
            "${{ steps.image.outputs.ref }}"

      - name: Upload Trivy results
        if: always() && steps.trivy-scan.outcome != 'skipped'
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-${{ env.IMAGE_NAME }}.sarif

      - name: Print Trivy findings
        if: always() && steps.trivy-scan.outcome != 'skipped'
        run: |
          trivy image \
            --skip-version-check \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --format table \
            --exit-code 0 \
            "${{ steps.image.outputs.ref }}"

      - name: Generate build summary
        if: always()
        run: |
          echo "## NSW Agency Image" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Mode: ${{ steps.release-mode.outputs.enabled == 'true' && 'Release' || 'Dry Run' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Version: ${{ steps.version.outputs.tag }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Image: ${{ env.REGISTRY }}/${{ steps.repo_owner.outputs.owner }}/${{ env.IMAGE_NAME }}" >> "$GITHUB_STEP_SUMMARY"
          if [ -n "${{ steps.build.outputs.digest }}" ]; then
            echo "- Digest: ${{ steps.build.outputs.digest }}" >> "$GITHUB_STEP_SUMMARY"
          fi

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build-and-publish
    if: needs.build-and-publish.outputs.release_enabled == 'true'
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Convert repository owner to lowercase
        id: repo_owner
        run: echo "owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Generate release summary
        run: |
          OWNER="${{ steps.repo_owner.outputs.owner }}"
          VERSION="${{ needs.build-and-publish.outputs.version }}"
          IMAGE="${{ env.REGISTRY }}/$OWNER/${{ env.IMAGE_NAME }}"
          DIGEST="${{ needs.build-and-publish.outputs.digest }}"
          {
            echo "## Release Summary"
            echo ""
            echo "| Image | Version | Image Target | Digest |"
            echo "| --- | --- | --- | --- |"
            echo "| NSW Agency | $VERSION | $IMAGE:${VERSION#v} | \`$DIGEST\` |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Create git tag (workflow_dispatch only)
        if: github.event_name == 'workflow_dispatch'
        run: |
          TAG="${{ needs.build-and-publish.outputs.version }}"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if ! git rev-parse "$TAG" >/dev/null 2>&1; then
            git tag "$TAG"
            git push origin "$TAG"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && needs.build-and-publish.outputs.version || github.ref }}
          name: Release ${{ needs.build-and-publish.outputs.version }}
          body: |
            ## Release ${{ needs.build-and-publish.outputs.version }}

            ### Published Image
            - `${{ env.REGISTRY }}/${{ steps.repo_owner.outputs.owner }}/${{ env.IMAGE_NAME }}:${{ needs.build-and-publish.outputs.version }}`

            ### Image Digest
            `${{ needs.build-and-publish.outputs.digest }}`
          draft: false
          prerelease: ${{ needs.build-and-publish.outputs.is_prerelease == 'true' }}
