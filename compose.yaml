# Local/dev orchestration for the NSW Agency stack.
#
# Startup order is enforced by depends_on conditions:
#   db (healthy) -> migrate (runs `migrate up`, exits 0) -> server (API + portal)
#
# The whole app is now ONE image (root Dockerfile): the server binary serves the
# API and the officer-portal SPA from the same port. There is no separate
# frontend container.
#
# The migrate service is one-shot: it applies pending migrations and exits.
# Seeing it as "exited (0)" in `docker compose ps` is expected, not an error.
# The server will not start until migrate has completed successfully.
#
# NOTE: the frontend and backend authenticate against an external IdP
# (VITE_IDP_BASE_URL / AUTH_JWKS_URL, default https://localhost:8090) that is
# NOT part of this compose. The UI loads, but login requires that IdP reachable.
#
# Usage (.env is the auto-loaded name, so no --env-file flag is needed):
#   cp .env.example .env                     # the ONE self-contained env file
#   docker compose up --build
#
# Root .env is the single, self-contained source of truth for the stack:
# it provides both the values compose interpolates (${AGENCY_PORT}, ${DB_*}) and
# the full container runtime config loaded as the only env_file on the server and
# migrate services. backend/.env and frontend/.env are NOT used here — they exist
# only for bare-metal `go run` / `pnpm dev`. The environment: blocks below pin the
# db connection + port so the host mapping and container config cannot drift. The
# portal is served on ${AGENCY_PORT} (same port as the API).

services:
  db:
    image: postgres:16-bookworm
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-nsw_agency_db}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-nsw_agency_db}"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - db-data:/var/lib/postgresql/data

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["/app/migrate", "up"]
    env_file:
      - .env
    environment:
      DB_DRIVER: postgres
      DB_HOST: db
      DB_PORT: "5432"
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_NAME: ${DB_NAME:-nsw_agency_db}
      MIGRATION_DIR: /app/migrations
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  server:
    build:
      context: .
      dockerfile: Dockerfile
    # The single self-contained env file: backend config, VITE_* browser config
    # (emitted at /runtime-env.js), and dialed URLs already on host.docker.internal.
    env_file:
      - .env
    # host.docker.internal is automatic on Docker Desktop; this makes it resolve
    # on Linux / CI as well.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # These pin the db connection + port for the container (environment: beats
    # env_file), so the host mapping below and the container's runtime config
    # share one source and cannot drift.
    environment:
      DB_DRIVER: postgres
      DB_HOST: db
      DB_PORT: "5432"
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_NAME: ${DB_NAME:-nsw_agency_db}
      PORT: ${AGENCY_PORT:-8081}
      # The portal and API share one origin now, so the browser's API base URL
      # is just this server's host-reachable address. Overrides .env.
      VITE_API_BASE_URL: "http://localhost:${AGENCY_PORT:-8081}"
    # Both sides from the same root var: host port == container listen port (PORT).
    # This single port serves both the API and the officer portal.
    ports:
      - "${AGENCY_PORT:-8081}:${AGENCY_PORT:-8081}"
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

volumes:
  db-data:
