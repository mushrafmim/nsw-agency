apiVersion: v1
kind: Service
metadata:
  name: {{ include "nsw-agency.fullname" . }}
  labels:
    {{- include "nsw-agency.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type | default "ClusterIP" }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
  selector:
    {{- include "nsw-agency.selectorLabels" . | nindent 4 }}
